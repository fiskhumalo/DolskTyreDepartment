# ── Database ──────────────────────────────────────────────────────────────────
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# ── JPA / Hibernate ───────────────────────────────────────────────────────────
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# VALIDATE: Hibernate checks entity mappings match the DB schema.
# Schema changes are handled exclusively by Flyway migrations (V1–V8+).
spring.jpa.hibernate.ddl-auto=validate

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ── Flyway ────────────────────────────────────────────────────────────────────
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true

# ── data.sql disabled ─────────────────────────────────────────────────────────
# Do NOT use data.sql alongside Flyway — seed data lives in the V8 migration.
spring.sql.init.mode=never

# ── Server ────────────────────────────────────────────────────────────────────
server.address=0.0.0.0
server.port=${PORT:8080}

# ── JWT ───────────────────────────────────────────────────────────────────────
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION_MS:604800000}

# ── CORS ──────────────────────────────────────────────────────────────────────
cors.allowed-origins=${ALLOWED_ORIGINS:http://localhost:8081}

# ── Serialization ─────────────────────────────────────────────────────────────
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.date-format=yyyy-MM-dd

# ── Error responses ───────────────────────────────────────────────────────────
server.error.include-message=always
server.error.include-binding-errors=always

# ── Logging ───────────────────────────────────────────────────────────────────
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.flywaydb=INFO
