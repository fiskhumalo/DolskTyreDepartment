# ══════════════════════════════════════════════════════════════════════════════
# Dolsk Tyre Backend — Unified Configuration
#
# HOW IT WORKS:
#   - On Render: env vars (DB_URL, JWT_SECRET, etc.) are set → those values win.
#   - Locally: env vars are NOT set → the fallback after the colon is used.
#   - No separate profiles needed. No risk of breaking production.
# ══════════════════════════════════════════════════════════════════════════════

# ── Database ──────────────────────────────────────────────────────────────────
# Render sets DB_URL/DB_USERNAME/DB_PASSWORD. Locally, falls back to localhost.
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5433/dolskTyresProject}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:Prodolsk7}
spring.datasource.driver-class-name=org.postgresql.Driver

# ── JPA / Hibernate ───────────────────────────────────────────────────────────
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ── Flyway ────────────────────────────────────────────────────────────────────
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true

# ── SQL init disabled (Flyway handles everything) ─────────────────────────────
spring.sql.init.mode=never

# ── Server ────────────────────────────────────────────────────────────────────
server.address=0.0.0.0
server.port=${PORT:8080}

# ── JWT ───────────────────────────────────────────────────────────────────────
# Render sets JWT_SECRET. Locally, the 44-char fallback is used (HS256 needs ≥32).
jwt.secret=${JWT_SECRET:dolsk-local-dev-secret-key-minimum-32chars}
jwt.expiration=${JWT_EXPIRATION_MS:604800000}

# ── CORS ──────────────────────────────────────────────────────────────────────
cors.allowed-origins=${ALLOWED_ORIGINS:http://localhost:8081,http://localhost:5173}

# ── Serialization ─────────────────────────────────────────────────────────────
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.date-format=yyyy-MM-dd

# ── Error responses ───────────────────────────────────────────────────────────
server.error.include-message=always
server.error.include-binding-errors=always

# ── Logging ───────────────────────────────────────────────────────────────────
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.flywaydb=INFO
