# ══════════════════════════════════════════════════════════════════════════════
# Dolsk Tyre Backend — Production Configuration
#
# PRODUCTION (Render): All secrets loaded from environment variables.
# LOCAL DEV: Activate 'local' profile → application-local.properties
# ══════════════════════════════════════════════════════════════════════════════

# ── Database ──────────────────────────────────────────────────────────────────
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5433/dolskTyresProject}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=${DB_POOL_SIZE:10}

# ── JPA / Hibernate ───────────────────────────────────────────────────────────
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false

# ── Flyway ────────────────────────────────────────────────────────────────────
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true

# ── SQL init disabled ─────────────────────────────────────────────────────────
spring.sql.init.mode=never

# ── Server ────────────────────────────────────────────────────────────────────
server.address=0.0.0.0
server.port=${PORT:8080}
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=30s

# ── JWT ───────────────────────────────────────────────────────────────────────
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION_MS:604800000}

# ── CORS ──────────────────────────────────────────────────────────────────────
cors.allowed-origins=${ALLOWED_ORIGINS:http://localhost:8081,http://localhost:5173}

# ── Serialization ─────────────────────────────────────────────────────────────
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.date-format=yyyy-MM-dd

# ── Error responses ───────────────────────────────────────────────────────────
server.error.include-message=never
server.error.include-binding-errors=never
server.error.include-stacktrace=never

# ── Actuator ──────────────────────────────────────────────────────────────────
# Only expose health endpoint publicly. All other actuator endpoints are disabled.
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never
management.info.env.enabled=true
management.info.java.enabled=true
info.app.name=Dolsk Tyre Backend
info.app.version=1.0.0

# ── Logging (production) ──────────────────────────────────────────────────────
logging.level.root=WARN
logging.level.com.dolsk.tyres=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN
logging.level.org.flywaydb=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%level] %logger{36} - %msg%n
