# ─── Database ────────────────────────────────────────────────────────────────
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5433/dolskTyresProject}
spring.datasource.username=${DB_USERNAME:postgres}
# Set DB_PASSWORD as an environment variable in production.
# The fallback value is for local development only — never commit real credentials.
spring.datasource.password=${DB_PASSWORD:Prodolsk7}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
# Use 'validate' or 'none' in production. Override via DDL_AUTO env var.
spring.jpa.hibernate.ddl-auto=${DDL_AUTO:update}
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ─── Serialization ───────────────────────────────────────────────────────────
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.date-format=yyyy-MM-dd

# ─── Error responses ─────────────────────────────────────────────────────────
server.error.include-message=always
server.error.include-binding-errors=always

# ─── Server ──────────────────────────────────────────────────────────────────
server.address=0.0.0.0
server.port=8080

# ─── JWT ─────────────────────────────────────────────────────────────────────
# Set JWT_SECRET as an environment variable in production.
# Minimum 32 characters required for HS256.
jwt.secret=${JWT_SECRET:my-super-secret-key-that-is-very-long1959}
jwt.expiration=${JWT_EXPIRATION_MS:604800000}

# ─── CORS ────────────────────────────────────────────────────────────────────
# Comma-separated list. Override with ALLOWED_ORIGINS env var in production.
cors.allowed-origins=${ALLOWED_ORIGINS:http://localhost:8081,http://localhost:8082}

# ─── Logging ─────────────────────────────────────────────────────────────────
logging.level.org.springframework.security=INFO
