# ── Database ──────────────────────────────────────────────────────────────────
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# ── JPA / Hibernate ───────────────────────────────────────────────────────────
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# update: Hibernate runs DDL first (creates/alters tables), THEN data.sql runs.
# This is safe for Render — Hibernate will add missing columns without wiping data.
# Switch to 'validate' once schema is stable and you use Flyway for migrations.
spring.jpa.hibernate.ddl-auto=${DDL_AUTO:update}

# CRITICAL: must be true when using data.sql alongside Hibernate DDL auto.
# Without this, Spring Boot runs data.sql BEFORE Hibernate creates the tables,
# causing "relation does not exist" errors on startup.
spring.jpa.defer-datasource-initialization=true

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ── SQL Init ──────────────────────────────────────────────────────────────────
# 'always' ensures data.sql runs on every startup (after Hibernate DDL).
# The data.sql itself uses ON CONFLICT DO NOTHING so re-runs are idempotent.
spring.sql.init.mode=always

# ── Server ────────────────────────────────────────────────────────────────────
server.address=0.0.0.0
server.port=${PORT:8080}

# ── JWT ───────────────────────────────────────────────────────────────────────
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION_MS:604800000}

# ── CORS ──────────────────────────────────────────────────────────────────────
cors.allowed-origins=${ALLOWED_ORIGINS:http://localhost:8081}

# ── Serialization ─────────────────────────────────────────────────────────────
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.date-format=yyyy-MM-dd

# ── Error responses ───────────────────────────────────────────────────────────
server.error.include-message=always
server.error.include-binding-errors=always

# ── Logging ───────────────────────────────────────────────────────────────────
# Show Hibernate SQL and JDBC errors in Render logs to diagnose production issues.
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.level.org.springframework.jdbc.datasource.init=DEBUG
