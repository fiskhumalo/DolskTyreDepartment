# ══════════════════════════════════════════════════════════════════════════════
# Dolsk Tyre Backend — Configuration
#
# PRODUCTION (Render): All env vars MUST be set. App fails if missing.
# LOCAL DEV: Use .env file or set env vars manually. DB fallbacks are safe
#            (localhost only), but JWT_SECRET has NO fallback.
# ══════════════════════════════════════════════════════════════════════════════

# ── Database ──────────────────────────────────────────────────────────────────
# DB_URL, DB_USERNAME are required on Render. Local fallbacks point to localhost only.
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5433/dolskTyresProject}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# ── JPA / Hibernate ───────────────────────────────────────────────────────────
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=${SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=false

# ── Flyway ────────────────────────────────────────────────────────────────────
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true

# ── SQL init disabled (Flyway handles everything) ─────────────────────────────
spring.sql.init.mode=never

# ── Server ────────────────────────────────────────────────────────────────────
server.address=0.0.0.0
server.port=${PORT:8080}

# ── JWT ───────────────────────────────────────────────────────────────────────
# NO FALLBACK. App will fail to start if JWT_SECRET is not set.
# This prevents production from accidentally using a known/weak secret.
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION_MS:604800000}

# ── CORS ──────────────────────────────────────────────────────────────────────
cors.allowed-origins=${ALLOWED_ORIGINS:http://localhost:8081,http://localhost:5173}

# ── Serialization ─────────────────────────────────────────────────────────────
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.date-format=yyyy-MM-dd

# ── Error responses ───────────────────────────────────────────────────────────
# NEVER expose internal errors to clients in production.
server.error.include-message=never
server.error.include-binding-errors=never
server.error.include-stacktrace=never

# ── Logging ───────────────────────────────────────────────────────────────────
logging.level.root=WARN
logging.level.com.dolsk.tyres=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=${SQL_LOG_LEVEL:WARN}
logging.level.org.flywaydb=INFO
